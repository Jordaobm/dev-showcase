sonar.projectKey=dev-showcase
sonar.projectName=dev-showcase
sonar.sourceEncoding=UTF-8

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/tests/**/*.spec.ts

# .next/out/coverage/relatórios são artefatos de build, não código-fonte.
# node_modules e o tsbuildinfo não fazem sentido para um scan de qualidade.
sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/coverage/**,**/playwright-report/**,**/test-results/**,**/*.d.ts

# Cobertura: só existe para o que a suíte Playwright consegue exercitar no
# browser via CDP (client components) — Route Handlers (src/app/api/**) nunca
# aparecem aqui, é limitação da técnica de coleta, não falta de teste (ver
# AGENTS.md). O Sonar ainda assim analisa esses arquivos estaticamente, só
# não reporta % de cobertura para eles.
sonar.javascript.lcov.reportPaths=coverage/playwright/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Mesma limitação acima, mas para o Sonar em si: sem isto, arquivos ausentes
# do lcov.info (porque nunca rodam no browser) são contados como 100%
# descobertos em vez de "não aplicável" — derrubando a cobertura geral por
# uma limitação de ferramenta, não por falta de teste real. Cobre Route
# Handlers, Server Components sem "use client" (layout.tsx nunca executa no
# client) e metadata routes especiais do Next (todas server-only, achado real
# confirmado consultando a API do Sonar por diretório: src/app estava em
# 2,5% de cobertura só por isso). src/testing/** também entra aqui por ser o
# próprio tooling de teste, não código de app. error.tsx/global-error.tsx
# ficam de fora de propósito — são "use client" de verdade, testáveis em
# princípio (só exigem forçar um erro de render), não é limitação de
# ferramenta.
#
# Lista estendida em 2026-07-15 (achado real): o Passo 9 (humanização de
# código) reescreveu praticamente todo arquivo do projeto, o que fez o
# SonarQube tratar como "new code" uma porção de arquivos que já eram
# estruturalmente não cobríveis há meses — derrubando o new-code coverage
# de uma vez sem nenhuma regressão de teste real por trás. Adicionados aqui:
# - src/app/not-found.tsx, page.tsx, sobre/page.tsx, showcase/[id]/page.tsx,
#   [...slug]/page.tsx, diagnostics/error-boundary/page.tsx: Server
#   Components sem "use client" (confirmado por grep), mesmo raciocínio de
#   layout.tsx acima.
# - src/lib/og-image.tsx, site-url.ts, supabase/server.ts: server-only
#   (usam next/headers ou a service role key do Supabase), nunca executam
#   no client.
# - src/sw.ts e src/features/offline-data-layer/services/opfs.ts: rodam em
#   contexto de Service Worker / Web Worker — o page.coverage do Playwright
#   só instrumenta o contexto da página principal, nunca vê workers.
#
# Achado em 2026-07-16: o glob `src/app/api/**` não cobre Route Handlers que
# precisam viver fora da pasta api/ por exigência de path (ex.: /llms.txt só
# funciona vindo de src/app/llms.txt/route.ts) nem os helpers server-only que
# esses Route Handlers importam mas que moram em src/lib/. Mesma categoria
# estrutural das exclusões acima (nunca executam no browser), só não batiam
# no glob existente. Adicionados: src/app/llms.txt/route.ts (Route Handler) e
# src/lib/apiError.ts (usado exclusivamente pelas rotas de src/app/api/**,
# confirmado via grep — nenhum consumidor client-side).
sonar.coverage.exclusions=src/app/api/**,src/app/layout.tsx,src/app/opengraph-image.tsx,src/app/twitter-image.tsx,src/app/robots.ts,src/app/sitemap.ts,src/app/manifest.ts,src/app/not-found.tsx,src/app/page.tsx,src/app/sobre/page.tsx,src/app/showcase/[id]/page.tsx,src/app/[...slug]/page.tsx,src/app/diagnostics/error-boundary/page.tsx,src/app/llms.txt/route.ts,src/i18n/request.ts,src/lib/og-image.tsx,src/lib/site-url.ts,src/lib/supabase/server.ts,src/lib/apiError.ts,src/sw.ts,src/features/offline-data-layer/services/opfs.ts,src/testing/**

# S6747 ("Unknown property found") é falso positivo em todo o feature 3d:
# a regra só conhece a lista de atributos DOM/React, mas @react-three/fiber
# estende JSX.IntrinsicElements com elementos Three.js (<group>, <mesh>,
# <pointLight> etc.) cujas props (position, args, transparent, blending,
# depthWrite, toneMapped, emissive, distance, decay, intensity, attach) são
# legítimas — o tsc entende essa extensão via module augmentation, o motor
# de regras do Sonar não. Ver https://community.sonarsource.com/t/103434.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S6747
sonar.issue.ignore.multicriteria.e1.resourceKey=src/features/3d/**/*.tsx
